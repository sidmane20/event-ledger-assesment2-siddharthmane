spring:
  application:
    name: account-service

  datasource:
    # Per-service, in-memory H2. Not shared with any other service.
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: false

server:
  port: 8081
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        # /health is served by our own controller; actuator powers metrics + diagnostics
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.eventledger: INFO
