spring:
  application:
    name: event-gateway

  datasource:
    # Per-service, in-memory H2. Independent of the account service's database.
    url: jdbc:h2:mem:eventdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  h2:
    console:
      enabled: false

server:
  port: 8080
  shutdown: graceful

# Downstream Account Service. Timeouts here bound how long a single attempt may
# block; ResourceAccessException on timeout is what the retry/circuit breaker act on.
account-service:
  base-url: ${ACCOUNT_SERVICE_BASE_URL:http://localhost:8081}
  connect-timeout-ms: 2000
  read-timeout-ms: 2000

resilience4j:
  circuitbreaker:
    instances:
      accountService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # 4xx are caller mistakes, not downstream faults — they must not open the breaker.
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      accountService:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        # Jitter: spread retries so callers don't all retry in lockstep.
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        # Only transient failures are worth retrying.
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignore-exceptions:
          - org.springframework.web.client.HttpClientErrorException
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    root: INFO
    com.eventledger: INFO
